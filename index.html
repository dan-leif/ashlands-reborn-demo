<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ashlands Reborn</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ash: #1a1510;
    --char: #0e0c09;
    --ember: #c8843a;
    --ember-dim: #7a4f20;
    --meadow: #6daa4a;
    --meadow-dim: #3d6128;
    --bone: #d4c9a8;
    --bone-dim: #8a7f62;
    --fog: rgba(200,180,140,0.08);
    --divider: rgba(200,180,140,0.15);
  }

  html, body {
    height: 100%;
    background: var(--char);
    color: var(--bone);
    font-family: 'EB Garamond', Georgia, serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* HEADER */
  header {
    width: 100%;
    text-align: center;
    padding: 3rem 1.5rem 1rem;
    background: linear-gradient(to bottom, #050402, transparent);
    position: relative;
  }

  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 80% at 50% 0%, rgba(200,132,58,0.12), transparent 70%);
    pointer-events: none;
  }

  .site-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 6vw, 3.8rem);
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--bone);
    text-shadow: 0 0 60px rgba(200,132,58,0.4);
    line-height: 1.1;
  }

  .site-title span { color: var(--ember); text-shadow: 0 0 40px rgba(200,132,58,0.7); }

  .site-subtitle {
    margin-top: 0.6rem;
    font-size: 1rem;
    font-style: italic;
    color: var(--bone-dim);
    letter-spacing: 0.08em;
  }

  .rune-line {
    margin: 1.4rem auto 0;
    width: 160px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--ember-dim), transparent);
  }

  /* LABELS */
  .label-strip {
    display: flex;
    justify-content: center;
    width: min(900px, 100%);
    padding: 0.6rem 1.2rem;
  }

  /* SLIDER */
  .slider-outer { width: min(900px, 100%); padding: 0 1rem; }

  .slider-frame {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 4px;
    border: 1px solid var(--divider);
    cursor: col-resize;
    user-select: none;
    touch-action: none;
    background: #111;
  }

  /* clip the image layers to the frame bounds */
  .img-before,
  .img-after-wrap,
  .img-placeholder {
    clip-path: inset(0);
  }

  .slider-frame img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  .img-before { z-index: 1; }

  .img-after-wrap {
    position: absolute;
    top: 0; left: 0;
    width: 50%;
    height: 100%;
    overflow: hidden;
    z-index: 2;
  }

  .img-after {
    position: absolute;
    top: 0; left: 0;
    width: var(--frame-w, 900px);
    height: 100%;
    object-fit: cover;
    max-width: none;
  }

  .drag-handle {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 100%;
    background: rgba(200,180,140,0.7);
    z-index: 10;
    pointer-events: none;
  }

  .drag-knob {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--ash);
    border: 2px solid var(--ember);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    box-shadow: 0 0 16px rgba(200,132,58,0.5);
  }

  .drag-knob svg { width: 16px; height: 16px; }

  /* placeholder when images are missing */
  .img-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    color: var(--bone-dim);
  }

  .img-placeholder .ph-icon {
    width: 48px; height: 48px;
    border: 2px dashed var(--divider);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
  }

  /* CAPTION */
  .caption-bar {
    flex: 1;
    text-align: center;
    font-size: 0.85rem;
    font-style: italic;
    color: var(--bone-dim);
    letter-spacing: 0.08em;
  }

  /* NAV */
  nav {
    width: min(900px, 100%);
    padding: 0.5rem 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .thumb-strip { display: flex; gap: 0.5rem; align-items: center; }

  .thumb {
    width: 52px; height: 34px;
    border-radius: 2px;
    border: 1px solid var(--divider);
    overflow: hidden;
    cursor: pointer;
    opacity: 0.45;
    transition: opacity 0.2s, border-color 0.2s;
    background: #111;
    flex-shrink: 0;
  }

  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb.active { opacity: 1; border-color: var(--ember); }
  .thumb:hover:not(.active) { opacity: 0.75; }

  /* FOOTER */
  footer {
    margin-top: auto;
    padding: 1.5rem;
    font-size: 0.8rem;
    color: var(--bone-dim);
    opacity: 0.5;
    font-style: italic;
    text-align: center;
  }

  /* FULLSCREEN BUTTON (inside frame) */
  .fullscreen-btn {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    z-index: 20;
    width: 32px; height: 32px;
    padding: 0;
    background: rgba(14,12,9,0.75);
    border: 1px solid var(--ember-dim);
    border-radius: 2px;
    color: var(--bone-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }

  .fullscreen-btn:hover { border-color: var(--ember); color: var(--ember); background: rgba(200,132,58,0.1); }
  .fullscreen-btn svg { width: 16px; height: 16px; pointer-events: none; }

  .slider-frame:fullscreen,
  .slider-frame:-webkit-full-screen {
    width: 100%;
    height: 100%;
    aspect-ratio: unset;
    border-radius: 0;
    border: none;
  }

  /* FULLSCREEN SCENE PICKER — absolute inside the frame, only shown when fullscreen */
  .fs-overlay {
    display: none;
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 30;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    padding: 1.2rem 1.5rem 1.4rem;
    background: linear-gradient(to top, rgba(5,4,2,0.95) 50%, transparent);
    pointer-events: none;
  }

  :fullscreen .fs-overlay,
  :-webkit-full-screen .fs-overlay { display: flex; }

  .fs-overlay-caption {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    letter-spacing: 0.14em;
    color: var(--bone);
  }

  .fs-scene-list {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    justify-content: center;
    pointer-events: all;
  }

  .fs-scene-btn {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.13em;
    padding: 0.35rem 1rem;
    background: rgba(14,12,9,0.85);
    border: 1px solid var(--divider);
    border-radius: 2px;
    color: var(--bone-dim);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    white-space: nowrap;
  }

  .fs-scene-btn:hover { border-color: var(--ember-dim); color: var(--ember); }
  .fs-scene-btn.active { border-color: var(--ember); color: var(--ember); background: rgba(200,132,58,0.1); }

  @media (max-width: 600px) {
    .site-title { font-size: 2rem; }
    .thumb { width: 42px; height: 28px; }
    .drag-knob { width: 28px; height: 28px; }
    .drag-knob svg { width: 12px; height: 12px; }
    .fullscreen-btn { width: 26px; height: 26px; }
    .fullscreen-btn svg { width: 13px; height: 13px; }
  }
</style>
</head>
<body>

<header>
  <h1 class="site-title">Ashlands <span>Reborn</span></h1>
</header>

<div class="slider-outer">
  <div class="slider-frame" id="sliderFrame">
    <!-- vanilla behind -->
    <div class="img-placeholder" id="phBefore">
      <div class="ph-icon">⏳</div>
      <span id="phBeforeLabel">photos/ruins_1_a.jpg</span>
    </div>
    <img class="img-before" id="imgBefore" src="" alt="Vanilla" style="display:none"/>

    <!-- reborn on top, clipped -->
    <div class="img-after-wrap" id="afterWrap">
      <div class="img-placeholder" id="phAfter" style="width:var(--frame-w,900px)">
        <div class="ph-icon">🌿</div>
        <span id="phAfterLabel">photos/ruins_1_b.jpg</span>
      </div>
      <img class="img-after" id="imgAfter" src="" alt="Reborn" style="display:none"/>
    </div>

    <!-- fullscreen scene picker -->
    <div class="fs-overlay" id="fsOverlay">
      <span class="fs-overlay-caption" id="fsOverlayCaption"></span>
      <div class="fs-scene-list" id="fsSceneList"></div>
    </div>

    <!-- fullscreen button -->
    <button class="fullscreen-btn" id="btnFullscreen" title="Toggle fullscreen" aria-label="Toggle fullscreen">
      <svg id="fsIcon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M1 6V1h5M10 1h5v5M15 10v5h-5M6 15H1v-5"/>
      </svg>
    </button>

    <!-- drag handle -->
    <div class="drag-handle" id="dragHandle">
      <div class="drag-knob">
        <svg viewBox="0 0 16 16" fill="none" stroke="#c8843a" stroke-width="1.5" stroke-linecap="round">
          <path d="M5 2l-3 6 3 6M11 2l3 6-3 6"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<div class="label-strip">
  <p class="caption-bar">Drag the bar to restore the Ashlands</p>
</div>

<nav>
  <div class="thumb-strip" id="thumbStrip"></div>
</nav>

<footer></footer>

<script>
const scenes = [
  { id: 'ruins_1',           caption: 'Ancient Ruins',              before: 'photos/ruins_1_a.jpg',           after: 'photos/ruins_1_b.jpg' },
  { id: 'lava_river_1',      caption: 'Lava River',                 before: 'photos/lava_river_1_a.jpg',      after: 'photos/lava_river_1_b.jpg' },
  { id: 'charred_warrior_1', caption: 'Charred Warrior',            before: 'photos/charred_warrior_1_a.jpg', after: 'photos/charred_warrior_1_b.jpg' },
  { id: 'charred_warrior_3', caption: 'Charred Warrior (Close-up)', before: 'photos/charred_warrior_3_a.jpg', after: 'photos/charred_warrior_3_b.jpg' },
  { id: 'valkyrie_1',        caption: 'Fallen Valkyrie',            before: 'photos/valkyrie_1_a.jpg',        after: 'photos/valkyrie_1_b.jpg' },
  { id: 'valkyrie_3',        caption: 'Fallen Valkyrie (Close-up)', before: 'photos/valkyrie_3_a.jpg',        after: 'photos/valkyrie_3_b.jpg' },
];

let current = 0;
let ratio = 0.10;
let dragging = false;

const frame       = document.getElementById('sliderFrame');
const afterWrap   = document.getElementById('afterWrap');
const dragHandle  = document.getElementById('dragHandle');
const imgBefore   = document.getElementById('imgBefore');
const imgAfter    = document.getElementById('imgAfter');
const phBefore    = document.getElementById('phBefore');
const phAfter     = document.getElementById('phAfter');
const phBeforeLabel = document.getElementById('phBeforeLabel');
const phAfterLabel  = document.getElementById('phAfterLabel');
const thumbStrip  = document.getElementById('thumbStrip');
const fsOverlay   = document.getElementById('fsOverlay');
const fsOverlayCaption = document.getElementById('fsOverlayCaption');
const fsSceneList = document.getElementById('fsSceneList');

function updateFrameWidth() {
  const w = frame.offsetWidth;
  frame.style.setProperty('--frame-w', w + 'px');
  phAfter.style.width = w + 'px';
  imgAfter.style.width = w + 'px';
}

function applyRatio(r) {
  ratio = Math.max(0.02, Math.min(0.98, r));
  const pct = (ratio * 100).toFixed(2) + '%';
  afterWrap.style.width = pct;
  dragHandle.style.left = pct;
}

function updateFsOverlay() {
  fsOverlayCaption.textContent = scenes[current].caption;
  fsSceneList.querySelectorAll('.fs-scene-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === current);
  });
}

function loadScene(idx) {
  current = idx;
  const s = scenes[idx];
  updateFrameWidth();
  updateThumbs();
  updateFsOverlay();
  // Preload both images, then swap instantly
  const bImg = new Image();
  const aImg = new Image();
  let loaded = 0;
  const onBothLoaded = () => {
    phBefore.style.display = 'none';
    phAfter.style.display = 'none';
    imgBefore.src = s.before;
    imgBefore.style.display = 'block';
    imgAfter.src = s.after;
    imgAfter.style.display = 'block';
    applyRatio(ratio);
  };
  const onLoad = () => { if (++loaded === 2) onBothLoaded(); };
  bImg.onload = onLoad;
  bImg.onerror = onLoad;
  aImg.onload = onLoad;
  aImg.onerror = onLoad;
  bImg.src = s.before;
  aImg.src = s.after;
}

// build regular thumbnail strip
scenes.forEach((s, i) => {
  const t = document.createElement('div');
  t.className = 'thumb';
  t.title = s.caption;
  const img = document.createElement('img');
  img.src = s.after;
  img.alt = s.caption;
  t.appendChild(img);
  t.addEventListener('click', () => loadScene(i));
  thumbStrip.appendChild(t);
});

// build fullscreen scene buttons
scenes.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'fs-scene-btn';
  btn.textContent = s.caption;
  btn.addEventListener('mousedown', e => e.stopPropagation());
  btn.addEventListener('touchstart', e => e.stopPropagation(), { passive: true });
  btn.addEventListener('click', () => loadScene(i));
  fsSceneList.appendChild(btn);
});

function updateThumbs() {
  thumbStrip.querySelectorAll('.thumb').forEach((t, i) => {
    t.classList.toggle('active', i === current);
  });
}

function getX(e) { return (e.touches ? e.touches[0] : e).clientX; }

function onMove(e) {
  if (!dragging) return;
  const rect = frame.getBoundingClientRect();
  applyRatio((getX(e) - rect.left) / rect.width);
}

frame.addEventListener('mousedown', e => { dragging = true; onMove(e); });
frame.addEventListener('touchstart', e => { dragging = true; onMove(e); }, { passive: true });
window.addEventListener('mousemove', onMove);
window.addEventListener('touchmove', onMove, { passive: true });
window.addEventListener('mouseup',  () => { dragging = false; });
window.addEventListener('touchend', () => { dragging = false; });


const btnFullscreen = document.getElementById('btnFullscreen');
const fsIcon        = document.getElementById('fsIcon');

const ICON_EXPAND   = 'M1 6V1h5M10 1h5v5M15 10v5h-5M6 15H1v-5';
const ICON_CONTRACT = 'M6 1v5H1M15 6h-5V1M10 15v-5h5M1 10h5v5';

function toggleFullscreen() {
  if (!document.fullscreenElement) {
    (frame.requestFullscreen || frame.webkitRequestFullscreen).call(frame);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
}

btnFullscreen.addEventListener('click', toggleFullscreen);

document.addEventListener('fullscreenchange', () => {
  const isFs = !!document.fullscreenElement;
  fsIcon.querySelector('path').setAttribute('d', isFs ? ICON_CONTRACT : ICON_EXPAND);
  updateFrameWidth();
  applyRatio(ratio);
  updateFsOverlay();
});

window.addEventListener('resize', () => { updateFrameWidth(); applyRatio(ratio); });

loadScene(0);

// Preload all scene images in the background after initial load
window.addEventListener('load', () => {
  scenes.forEach(s => {
    new Image().src = s.before;
    new Image().src = s.after;
  });
});
</script>
</body>
</html>
